<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - TRR Electric</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logos-wrapper">
            <a href="/" class="logo-container">
                <img src="{{ url_for('static', filename='logos/SAE_logo.webp') }}" alt="SAE Logo" class="partner-logo sae-logo">
                <img src="{{ url_for('static', filename='logos/NIT_Rourkela_Colour_Logo.svg') }}" alt="NIT Rourkela Logo" class="partner-logo">
                <img src="{{ url_for('static', filename='logos/logo.png') }}" alt="Team Logo" class="team-logo">
                <div class="logo-text"><span class="prefix-red">TEAM</span> ROAD RUNNER <span class="suffix-cyan">ELECTRIC</span></div>
            </a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/team">Our Team</a></li>
            <li class="dropdown">
                <a href="#" class="dropdown-toggle">Resources &#9662;</a>
                <ul class="dropdown-menu">
                    <li><a href="/gallery">Gallery</a></li>
                    <li><a href="/brochure">Brochure</a></li>
                    <li><a href="/research">Research</a></li>
                </ul>
            </li>
            <li><a href="/contact" class="btn-join-nav">Contact Us</a></li>
        </ul>
    </nav>
    <script>
        const btn = document.getElementById('hamburger');
        const nav = document.getElementById('nav-links');
        btn.addEventListener('click', () => { btn.classList.toggle('open'); nav.classList.toggle('open'); });
        nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { btn.classList.remove('open'); nav.classList.remove('open'); }));
    </script>

    <section class="page-hero">
        <h1>GALLERY</h1>
        <p>Behind the scenes, on the track, and in the workshop.</p>
    </section>

    <!-- Filter tabs -->
    <section class="gallery-section">
        <div class="gallery-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="car">The Car</button>
            <button class="filter-btn" data-filter="team">Team</button>
            <button class="filter-btn" data-filter="events">Events</button>
        </div>

        <!-- Empty state — replace this div with gallery grid once photos are available -->
        <div class="gallery-empty">
            <div class="empty-icon">&#9724;</div>
            <h3>Photos Coming Soon</h3>
            <p>We're gearing up. Check back after the next event.</p>
        </div>

        <!-- Gallery grid — uncomment and populate when photos are ready
        <div class="gallery-grid">
            <div class="gallery-item" data-category="car">
                <img src="{{ url_for('static', filename='gallery/photo1.jpg') }}" alt="Car photo">
                <div class="gallery-overlay"><span>Chassis Build</span></div>
            </div>
        </div>
        -->
    </section>

    <footer><p>&copy; 2024 Team Road Runner Electric.</p></footer>
</body>
</html>
